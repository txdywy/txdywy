name: Update Recent Activity

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Activity Section
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const readmePath = 'README.md';
            let content = fs.readFileSync(readmePath, 'utf8');

            // 安全转义：清理外部输入中的 markdown 特殊字符
            function escapeMarkdown(str) {
              return str
                .replace(/\\/g, '\\\\')
                .replace(/\|/g, '\\|')
                .replace(/\n/g, ' ')
                .replace(/\r/g, ' ')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .trim();
            }

            // 获取最近 10 条 public events，筛选 push
            const { data: events } = await github.rest.activity.listPublicEventsForUser({
              username: 'txdywy',
              per_page: 10
            });

            const commits = [];
            for (const event of events) {
              if (event.type === 'PushEvent' && event.payload?.commits) {
                for (const commit of event.payload.commits) {
                  if (commits.length >= 5) break;
                  const date = event.created_at.slice(0, 10);
                  const rawMsg = commit.message.split('\n')[0];
                  const msg = escapeMarkdown(rawMsg).slice(0, 55);
                  const sha = commit.sha.slice(0, 7);
                  commits.push({ date, sha, msg });
                }
              }
              if (commits.length >= 5) break;
            }

            if (commits.length === 0) {
              console.log('No commits found');
              return;
            }

            // 构建 markdown 表格
            const lines = [
              '### ◦ 近期活动',
              '',
              '| 日期 | Commit | 说明 |',
              '|:---:|:---|:---|'
            ];
            for (const c of commits) {
              lines.push(`| ${c.date} | \`${c.sha}\` | ${c.msg} |`);
            }
            const newSection = lines.join('\n') + '\n';

            // 替换近期活动部分
            const markerStart = '### ◦ 近期活动';
            const markerEnd = '### ◦ 联系方式';
            const startIdx = content.indexOf(markerStart);
            const endIdx = content.indexOf(markerEnd);

            if (startIdx === -1 || endIdx === -1) {
              console.log('Marker not found, skipping update');
              return;
            }

            content = content.slice(0, startIdx) + newSection + '\n' + content.slice(endIdx);
            fs.writeFileSync(readmePath, content);
            console.log('README updated with', commits.length, 'commits');

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add README.md
          git commit -m "Update recent activity [skip ci]"
          git push
